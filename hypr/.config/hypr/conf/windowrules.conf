# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# left screen has workspaces 1-5
# right screen has workspaces 6-10
# no screen has workspaces 11-15

$leftMonitor = 0
$rightMonitor = 1

# Layer rules for launchers
# layerrule = blur, rofi
# layerrule = blur, wofi

# Discord - workspace 5
windowrule = workspace 5, match:class ^(discord)$

# Slack - workspace 5
windowrule = workspace 5, match:class ^(Slack)$

# Spotify - workspace 4
windowrule = workspace 4, match:class ^(Spotify)$

# Bluebubbles - workspace 4
windowrule = workspace 4, match:class ^(bluebubbles)$

# Link UI
windowrule = monitor $leftMonitor, match:class ^(link-ui)$

# Unreal Editor - suppress initial focus
windowrule = no_initial_focus on, match:class ^(UnrealEditor)$, match:title ^\w*$

# Keep modal/tool dialogs usable
windowrule = float on, match:class ^(UnrealEditor)$, match:title ^(Open|Save|Import|Export|Project Settings|Editor Preferences|Pick Parent Class|Message|Warning|Error).*
windowrule = center on, match:class ^(UnrealEditor)$, match:title ^(Open|Save|Import|Export|Project Settings|Editor Preferences|Pick Parent Class|Message|Warning|Error).*
