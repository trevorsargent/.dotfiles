# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# left screen has workspaces 1-5
# right screen has workspaces 6-10
# no screen has workspaces 11-15

$leftMonitor = 0
$rightMonitor = 1

# Layer rules for launchers
# layerrule = blur, rofi
# layerrule = blur, wofi

# Discord - workspace 5
windowrulev2 = workspace 5, class:^(discord)$

# Slack - workspace 5
windowrulev2 = workspace 5, class:^(Slack)$

# Spotify - workspace 4
windowrulev2 = workspace 4, class:^(Spotify)$

# Bluebubbles - workspace 4
windowrulev2 = workspace 4, class:^(bluebubbles)$

# Link UI
windowrulev2 = monitor $leftMonitor, class:^(link-ui)$

# Unreal Editor - suppress initial focus
windowrulev2 = unset, class:^(UnrealEditor)$, title:^\w*$
windowrulev2 = noinitialfocus, class:^(UnrealEditor)$, title:^\w*$
windowrulev2 = suppressevent activate, class:^(UnrealEditor)$, title:^\w*$
